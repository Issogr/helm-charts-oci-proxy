name: Publish Chart

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Helm chart version to publish
        required: true
      app_version:
        description: App version to embed in the chart (defaults to version)
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Determine release versions
        id: versions
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            APP_VERSION="$VERSION"
          else
            VERSION="${{ github.event.inputs.version }}"
            APP_VERSION="${{ github.event.inputs.app_version }}"
            if [[ -z "$APP_VERSION" ]]; then
              APP_VERSION="$VERSION"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Stamp chart version
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.version }}
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
        run: |
          yq -i '.version = strenv(RELEASE_VERSION)' chart/Chart.yaml
          yq -i '.appVersion = strenv(APP_VERSION)' chart/Chart.yaml

      - name: Copy README into chart package
        run: cp README.md chart/README.md

      - name: Validate chart
        run: |
          helm lint ./chart
          helm template chartproxy ./chart >/tmp/chart-rendered.yaml

      - name: Create chart package
        run: helm package chart -d ./tmp

      - name: Login to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push packaged chart to registry
        run: helm push ./tmp/* oci://ghcr.io/${{ steps.owner.outputs.value }}/helm-charts
